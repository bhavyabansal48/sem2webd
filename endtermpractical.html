<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Result</title>
      <style>
    body {
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      text-align: center;
      padding: 80px;
    }

    h2 {
      color: #2c3e50;
      margin-bottom: 40px;
    }

    .result-box {
      background: #fff;
      border: 2px solid #3498db;
      border-radius: 8px;
      padding: 20px;
      width: 300px;
      margin: 0 auto;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .result-box p {
      font-size: 16px;
      margin: 10px 0;
    }

    .pass {
      color: green;
      font-weight: bold;
    }

    .fail {
      color: red;
      font-weight: bold;
    }
  </style>
    
</head>
<body>
    <h2>Student Result Program</h2>

    
    
    <script>
        var subjects = prompt("Enter number of subjects:");
        var total =0;
        for(var i=1;i<=subjects;i++){
            var marks =prompt("Enter marks of subject " + i);
            total=total + Number(marks);
        }
        var average=total/subjects;
        var grade;
        var result;
        if(average>=60){
            grade="A";
            result="Pass";
        }
        else if(average>=50){
            grade="B";
            result="Pass";
        }
         else if(average>=40){
                grade="c";
                result="pass";
            } 
            else{
                grade="D";
                result="fail";
            }
             document.write("total marks="+total);
            document.write("<br>");
            document.write("average marks="+average);
            document.write("<br>");
            document.write("grade="+grade);
            document.write("<br>");
            document.write("Result="+result);
        

    </script>
    
</body>
</html>
