<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
</head>
<body>
    <p class="display-1">Hello World</p>
    <p class="display-2">Hello World</p>
    <p class="display-3">Hello World</p>
    <h2 class="text-center">Hello World</h2>
    <h1 class="text-start">Welcome to Bootstrap</h1>
    <h3 class="text-end">This is a heading</h3>
    <h2 class="text-primary">Hello World</h2>//blue
    <h2 class="text-secondary">Hello World</h2>//gray
    <h2 class="text-success">Hello World</h2>//green
    <h2 class="text-warning">Hello World</h2>//yellow
    <h2 class="text-danger">Hello World</h2>//red
    <h2 class="text-dark">Hello World</h2>//dark
    <h2 class="text-info">Hello World</h2>//light blue
    <h2 class="text-primary text-center">Hello World</h2>
    <h2 class="text-primary text-end">Hello World</h2>
    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-lg btn-secondary">Secondary</button>
    <button class="btn btn-sm btn-success">Success</button>
    <button class="btn btn-outline-danger">hello</button>//hover effect
    <button class="btn btn-outline-primary" onclick="alert('Hello, Bootstrap!')">hello</button>
</body>
</html>
