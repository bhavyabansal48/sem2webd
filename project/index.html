<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <nav class="nav">
      <h1>My To-Do List</h1>
    </nav>
    <br><br>
    <p>HELLO EVERYONE I AM A TO-DO-LIST , I AM HERE TO HELP YOU IN MANY TASK
        AS YOU FORGET YOUR TASKS SO YOU ENTER ALL YOUR IMPORTANT TASKS HERE AND I WILL MENTION ALL THOSE ON THE SCREEN AND WHEN YOU DONE THOSE YOU CAN EASILY REMOVE THEM.
    </p>
    <BR><BR>
    <input type="text" id="taskInput" placeholder="Enter a task">
    <button onclick="addTask()">Add</button>
    <ul id="taskList"></ul>
  </div>
  <script src="script.js"></script>
</body>
</html>
